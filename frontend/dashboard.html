<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Auth App</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="card dashboard-card">
        <div class="top-row">
          <h1>Expense Dashboard</h1>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
        <p class="subtitle">Track daily spending with your own private data.</p>

        <div id="message" class="message"></div>
        <div class="user-box">
          <strong>Name:</strong> <span id="userName">Loading...</span><br />
          <strong>Email:</strong> <span id="userEmail">Loading...</span>
        </div>

        <div class="summary-grid">
          <div class="summary-item">
            <span class="summary-label">Total Expenses</span>
            <strong id="totalExpenses">0</strong>
          </div>
          <div class="summary-item">
            <span class="summary-label">Total Amount</span>
            <strong id="totalAmount">INR 0.00</strong>
          </div>
        </div>

        <form id="expenseForm" class="expense-form" novalidate>
          <div class="expense-grid">
            <div class="form-group">
              <label for="title">Title</label>
              <input id="title" type="text" placeholder="Groceries" required />
            </div>
            <div class="form-group">
              <label for="amount">Amount</label>
              <input id="amount" type="number" min="0.01" step="0.01" placeholder="500" required />
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <input id="category" type="text" placeholder="Food" required />
            </div>
            <div class="form-group">
              <label for="date">Date</label>
              <input id="date" type="date" required />
            </div>
          </div>
          <div class="form-group">
            <label for="note">Note (optional)</label>
            <input id="note" type="text" placeholder="Dinner with friends" />
          </div>
          <button type="submit">Add Expense</button>
        </form>

        <div class="list-header">
          <h2>Your Expense List</h2>
        </div>

        <div class="graph-card">
          <div class="graph-header">
            <h2>Expense Level Graph</h2>
            <span id="graphHint" class="graph-hint">Low / Medium / High by your data range</span>
          </div>
          <canvas id="expenseChart" height="180"></canvas>
        </div>

        <ul id="expenseList" class="expense-list"></ul>
      </div>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/dashboard.js"></script>
  </body>
</html>
